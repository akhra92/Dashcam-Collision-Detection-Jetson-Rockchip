# =====================================================================
# Model #1 variant — Jetson Orin, VideoMAE (ViT) backbone.
# Same temporal-detection framing as the R(2+1)D config, but a heavier,
# higher-accuracy self-supervised transformer at 224x224.
# Needs its own 224px data dir (CNN uses 112px).
# =====================================================================

experiment_name: jetson_videomae_base

paths:
  dataset_root: dataset
  clips_dir: artifacts/clips224          # SEPARATE high-res strips for VideoMAE
  output_dir: artifacts/runs

strip:
  target_fps: 16
  strip_seconds: 8.0
  pre_event_seconds: 5.0
  short_side: 224                        # store 224 square (VideoMAE native res)
  fallback_fps: 30.0

input:
  num_frames: 16
  crop_size: 224
  mean: [0.485, 0.456, 0.406]            # VideoMAE image-processor normalization
  std:  [0.229, 0.224, 0.225]

window:
  pos_pre: 1.0
  pos_post: 0.5
  ignore_post: 2.5
  stride: 3
  neg_ratio: 3
  temporal_jitter: 1

negatives:
  per_video: 16
  guard_seconds: 1.0

model:
  arch: videomae_base                    # videomae_base | videomae_large | r2plus1d_18 ...
  pretrained: true
  dropout: 0.5
  freeze_stem_epochs: 1                  # warm up the new head for 1 epoch

train:
  seed: 42
  val_fraction: 0.15
  epochs: 12
  batch_size: 8                          # ViT @224 + grad-checkpointing ~6.2GB on 8GB
  num_workers: 6
  amp: true
  optimizer: adamw
  lr: 1.0e-4                             # head LR; backbone = lr * backbone_lr_mult
  backbone_lr_mult: 0.1                  # ViT fine-tunes slowly (1e-5)
  weight_decay: 0.05
  warmup_epochs: 1
  scheduler: cosine
  label_smoothing: 0.05
  grad_clip: 1.0
  early_stop_patience: 6
  monitor: val_ap

aug:
  hflip_prob: 0.5
  color_jitter: 0.2
  random_resized_crop_scale: [0.7, 1.0]

detect:
  threshold: 0.5
  consec: 3
  tolerance_s: 1.0

export:
  opset: 17
  dynamic_batch: true
  simplify: true
